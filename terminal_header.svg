<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }

      /* Líneas que aparecen secuencialmente */
      .line1  { opacity: 0; animation: fadein 0.1s 0.8s forwards; }
      .line2  { opacity: 0; animation: fadein 0.1s 1.6s forwards; }
      .line3  { opacity: 0; animation: fadein 0.1s 2.0s forwards; }
      .line4  { opacity: 0; animation: fadein 0.1s 2.4s forwards; }
      .line5  { opacity: 0; animation: fadein 0.1s 2.8s forwards; }
      .line6  { opacity: 0; animation: fadein 0.1s 3.2s forwards; }
      .line7  { opacity: 0; animation: fadein 0.1s 3.6s forwards; }
      .line8  { opacity: 0; animation: fadein 0.1s 4.4s forwards; }
      .line9  { opacity: 0; animation: fadein 0.1s 5.0s forwards; }
      .line10 { opacity: 0; animation: fadein 0.1s 5.4s forwards; }
      .line11 { opacity: 0; animation: fadein 0.1s 5.8s forwards; }

      /* Cursor parpadeante */
      .cursor { animation: blink 1s step-end infinite; }

      /* Prompt 2 aparece después del output */
      .prompt2 { opacity: 0; animation: fadein 0.1s 4.2s forwards; }
      .prompt1 { opacity: 0; animation: fadein 0.1s 0.6s forwards; }

      @keyframes fadein { to { opacity: 1; } }
      @keyframes blink  { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- Fondo de la ventana -->
  <rect width="680" height="320" rx="12" fill="#0d1117"/>

  <!-- Barra superior -->
  <rect width="680" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="680" height="12" fill="#161b22"/>

  <!-- Dots -->
  <circle cx="20" cy="19" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="19" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="19" r="6" fill="#28C840"/>

  <!-- Título de la barra -->
  <text x="340" y="24" text-anchor="middle" fill="#484f58" font-size="12">bash — brayan@dev: ~</text>

  <!-- BLOQUE 1: primer comando -->
  <g class="prompt1">
    <text x="24" y="70" font-size="13" fill="#3fb950">brayan@dev</text>
    <text x="112" y="70" font-size="13" fill="#484f58">:</text>
    <text x="120" y="70" font-size="13" fill="#58a6ff">~</text>
    <text x="132" y="70" font-size="13" fill="#484f58">$</text>
    <text x="144" y="70" font-size="13" fill="#e6edf3"> whoami --full</text>
  </g>

  <!-- Output líneas -->
  <g class="line1">
    <text x="24"  y="96"  font-size="13" fill="#7c3aed">name</text>
    <text x="90"  y="96"  font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="96"  font-size="13" fill="#e6edf3">Brayan Camilo Clavijo Gómez</text>
  </g>
  <g class="line2">
    <text x="24"  y="116" font-size="13" fill="#7c3aed">rol</text>
    <text x="90"  y="116" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="116" font-size="13" fill="#e6edf3">Mobile &amp; Backend Developer</text>
  </g>
  <g class="line3">
    <text x="24"  y="136" font-size="13" fill="#7c3aed">stack</text>
    <text x="90"  y="136" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="136" font-size="13" fill="#e6edf3">Flutter · Django · PostgreSQL</text>
  </g>
  <g class="line4">
    <text x="24"  y="156" font-size="13" fill="#7c3aed">ubicacion</text>
    <text x="90"  y="156" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="156" font-size="13" fill="#e6edf3">Colombia 🇨🇴</text>
  </g>
  <g class="line5">
    <text x="24"  y="176" font-size="13" fill="#7c3aed">experiencia</text>
    <text x="90"  y="176" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="176" font-size="13" fill="#3fb950">2+ años</text>
  </g>

  <!-- BLOQUE 2: segundo comando -->
  <g class="prompt2">
    <text x="24" y="204" font-size="13" fill="#3fb950">brayan@dev</text>
    <text x="112" y="204" font-size="13" fill="#484f58">:</text>
    <text x="120" y="204" font-size="13" fill="#58a6ff">~</text>
    <text x="132" y="204" font-size="13" fill="#484f58">$</text>
    <text x="144" y="204" font-size="13" fill="#e6edf3"> cat links.txt</text>
  </g>

  <g class="line8">
    <text x="24"  y="228" font-size="13" fill="#7c3aed">linkedin</text>
    <text x="90"  y="228" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="228" font-size="13" fill="#58a6ff">/in/brayan-camilo-clavijo-gomez</text>
  </g>
  <g class="line9">
    <text x="24"  y="248" font-size="13" fill="#7c3aed">email</text>
    <text x="90"  y="248" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="248" font-size="13" fill="#58a6ff">bclavijogomez@gmail.com</text>
  </g>
  <g class="line10">
    <text x="24"  y="268" font-size="13" fill="#7c3aed">web</text>
    <text x="90"  y="268" font-size="13" fill="#484f58">  →  </text>
    <text x="130" y="268" font-size="13" fill="#58a6ff">brayan-clavijo.vercel.app</text>
  </g>

  <!-- Prompt final + cursor -->
  <g class="line11">
    <text x="24" y="295" font-size="13" fill="#3fb950">brayan@dev</text>
    <text x="112" y="295" font-size="13" fill="#484f58">:</text>
    <text x="120" y="295" font-size="13" fill="#58a6ff">~</text>
    <text x="132" y="295" font-size="13" fill="#484f58">$</text>
    <rect class="cursor" x="144" y="282" width="8" height="14" fill="#3fb950"/>
  </g>
</svg>
